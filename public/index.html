<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VERTEX PANEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:{900:'#0a0a0f',800:'#12121a',700:'#1a1a25',600:'#252530'},accent:{500:'#ef4444',600:'#dc2626',700:'#b91c1c'}}}}}
</script>
<style>
body{background:#0a0a0a;color:#e5e5e5;font-family:'Segoe UI',system-ui,sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#12121a}::-webkit-scrollbar-thumb{background:#252530;border-radius:3px}
.glow{box-shadow:0 0 20px rgba(239,68,68,0.15)}.pulse-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#debug-modal{display:none}#debug-modal.show{display:flex}
.report-row{animation:fadeSlide .3s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.sending-pulse{animation:sendPulse 1.2s ease-in-out infinite}
@keyframes sendPulse{0%,100%{opacity:1}50%{opacity:0.3}}
.success-flash{animation:successFlash .6s ease}
@keyframes successFlash{0%{background-color:rgba(34,197,94,0.2)}100%{background-color:transparent}}
</style>
</head>
<body class="min-h-screen">
<div class="max-w-6xl mx-auto p-4 md:p-6">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-lg bg-accent-600 flex items-center justify-center text-white font-bold text-lg">V</div>
    <div><h1 class="text-xl font-bold text-white">VERTEX PANEL</h1><p class="text-xs text-gray-500">v4.8 — Baileys 6.3.0</p></div>
    <div class="ml-auto flex items-center gap-3">
      <button onclick="openDebug()" class="px-3 py-1.5 bg-dark-600 hover:bg-dark-700 text-gray-400 text-xs font-medium rounded-lg transition">Debug</button>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></span><span class="text-xs text-gray-400">Online</span></div>
    </div>
  </div>
  <div class="mb-8">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Sessions</h2>
      <button onclick="addSession()" class="px-3 py-1.5 bg-accent-600 hover:bg-accent-700 text-white text-xs font-medium rounded-lg transition">+ Add Session</button>
    </div>
    <div id="session-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div id="empty-sessions" class="col-span-full text-center py-12 text-gray-600 text-sm">Loading...</div>
    </div>
  </div>
  <div class="bg-dark-800 rounded-xl border border-dark-600 p-6 mb-8 glow">
    <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-5">Ban Configuration</h2>
    <div class="flex gap-2 mb-5">
      <button id="btn-num" onclick="setBanType('number')" class="px-4 py-2 rounded-lg text-xs font-medium transition bg-accent-600 text-white">Number</button>
      <button id="btn-grp" onclick="setBanType('group')" class="px-4 py-2 rounded-lg text-xs font-medium transition bg-dark-600 text-gray-400 hover:text-white">Group</button>
    </div>
    <div id="inp-num" class="mb-4">
      <label class="block text-xs text-gray-500 mb-1.5">Target Number</label>
      <input id="target-number" type="text" placeholder="94771234567" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-600">
    </div>
    <div id="inp-grp" class="mb-4 hidden">
      <label class="block text-xs text-gray-500 mb-1.5">Group Invite Link</label>
      <div class="flex gap-2">
        <input id="target-group" type="text" placeholder="https://chat.whatsapp.com/..." class="flex-1 bg-dark-700 border border-dark-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-600">
        <button onclick="resolveGroup()" class="px-4 py-2 bg-dark-600 hover:bg-dark-700 text-gray-300 text-xs rounded-lg transition">Resolve</button>
      </div>
      <div id="group-info" class="mt-2 text-xs text-gray-500"></div>
    </div>
    <div class="mb-5">
      <label class="block text-xs text-gray-500 mb-1.5">Reports Per Session</label>
      <div class="flex items-center gap-3">
        <button onclick="changeCount(-1)" class="w-8 h-8 rounded-lg bg-dark-600 hover:bg-dark-700 text-gray-300 flex items-center justify-center transition">-</button>
        <span id="report-count" class="text-lg font-bold text-white w-8 text-center">5</span>
        <button onclick="changeCount(1)" class="w-8 h-8 rounded-lg bg-dark-600 hover:bg-dark-700 text-gray-300 flex items-center justify-center transition">+</button>
      </div>
    </div>
    <div class="mb-5">
      <label class="block text-xs text-gray-500 mb-2">Use Sessions</label>
      <div id="session-checks" class="flex flex-wrap gap-2"><span class="text-xs text-gray-600">Link sessions first</span></div>
    </div>
    <button onclick="executeBan()" id="btn-exec" class="w-full py-3 bg-accent-600 hover:bg-accent-700 disabled:bg-dark-600 disabled:text-gray-600 text-white font-semibold rounded-lg transition text-sm" disabled>EXECUTE BAN</button>
  </div>
  <div id="results-section" class="hidden mb-8">
    <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-4">Live Report Feed</h2>
    <div id="sending-indicator" class="hidden mb-3 flex items-center gap-3 px-4 py-3 bg-dark-700 rounded-lg border border-dark-600">
      <div class="flex gap-1.5"><span class="w-2 h-2 rounded-full bg-accent-600 sending-pulse"></span><span class="w-2 h-2 rounded-full bg-accent-600 sending-pulse" style="animation-delay:0.3s"></span><span class="w-2 h-2 rounded-full bg-accent-600 sending-pulse" style="animation-delay:0.6s"></span></div>
      <span class="text-accent-400 text-sm font-medium">Sending reports...</span>
    </div>
    <div id="results-list" class="space-y-1.5 mb-4"></div>
    <div id="results-summary" class="bg-dark-800 rounded-lg border border-dark-600 p-4 text-sm hidden"></div>
  </div>
</div>
<div id="debug-modal" class="fixed inset-0 bg-black/80 z-50 items-center justify-center p-4">
  <div class="bg-dark-800 rounded-xl border border-dark-600 w-full max-w-2xl max-h-[80vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-dark-600">
      <h3 class="text-sm font-bold text-white">DEBUG LOG</h3>
      <div class="flex gap-2">
        <button onclick="refreshDebug()" class="px-3 py-1 bg-dark-600 hover:bg-dark-700 text-gray-300 text-xs rounded-lg transition">Refresh</button>
        <button onclick="closeDebug()" class="px-3 py-1 bg-dark-600 hover:bg-dark-700 text-gray-300 text-xs rounded-lg transition">Close</button>
      </div>
    </div>
    <div id="debug-info" class="p-4 border-b border-dark-600 text-xs text-gray-400"></div>
    <div id="debug-logs" class="p-4 overflow-y-auto flex-1 font-mono text-xs space-y-1"></div>
  </div>
</div>
<script>
let sessions=[],banType='number',reportCount=5,groupJid=null,pollingIntervals={};
async function api(p,b){return(await fetch('/api/'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}
async function apiGet(p){return(await fetch('/api/'+p)).json()}
async function apiDel(p){await fetch('/api/'+p,{method:'DELETE'})}
function openDebug(){document.getElementById('debug-modal').classList.add('show');refreshDebug()}
function closeDebug(){document.getElementById('debug-modal').classList.remove('show')}
async function refreshDebug(){
  try{
    const d=await apiGet('debug');
    let ai='';
    if(d.authDirs&&d.authDirs.length)ai='<br><span class="text-gray-500 mt-1 block">Auth:</span> '+d.authDirs.map(a=>'<span class="'+(a.hasCreds?'text-green-400':'text-gray-500')+'">'+a.dir+(a.hasCreds?' ('+(a.registered?'reg':'unreg')+')':' (empty)')+'</span>').join(' ');
    document.getElementById('debug-info').innerHTML='<span class="text-gray-500">Node:</span> <span class="text-white">'+d.node+'</span> <span class="text-gray-500">Baileys:</span> <span class="text-white">'+d.baileys+'</span> <span class="text-gray-500">Sessions:</span> <span class="text-white">'+d.sessions+'</span>'+ai;
    document.getElementById('debug-logs').innerHTML=d.logs.map(l=>{let c='text-gray-400';if(l.msg.includes('CLOSED')||l.msg.includes('error')||l.msg.includes('Error'))c='text-red-400';else if(l.msg.includes('QR')||l.msg.includes('OPEN')||l.msg.includes('Sent')||l.msg.includes('Message sent'))c='text-green-400';else if(l.msg.includes('Reconnect'))c='text-yellow-400';return'<div class="'+c+'">['+l.time.split('T')[1].split('.')[0]+'] '+l.msg+'</div>'}).join('');
    document.getElementById('debug-logs').scrollTop=99999;
  }catch(e){document.getElementById('debug-logs').innerHTML='<div class="text-red-400">'+e.message+'</div>'}
}
async function loadExistingSessions(){
  try{
    const list=await apiGet('sessions');
    for(const s of list){
      const lid='loaded_'+s.id;
      sessions.push({id:s.id,localId:lid,phone:s.phone,method:'qr',qrImage:s.qrImage,code:s.code,status:s.status,error:s.error,selected:true,reports:s.reports,banStatus:s.banStatus,banMessageStatus:s.banMessageStatus});
      if(s.status!=='linked')pollingIntervals[lid]=setInterval(()=>pollSession(lid),2000);
    }
    renderSessions();
  }catch(e){}
}
function addSession(){sessions.push({id:null,localId:'local_'+Date.now(),phone:'',method:'qr',qrImage:null,code:null,status:'new',error:null,selected:true,reports:null,banStatus:null,banMessageStatus:null});renderSessions()}
function removeSession(lid){const s=sessions.find(x=>x.localId===lid);if(s&&s.id)apiDel('session/'+s.id);if(pollingIntervals[lid]){clearInterval(pollingIntervals[lid]);delete pollingIntervals[lid]}sessions=sessions.filter(x=>x.localId!==lid);renderSessions()}
async function linkSession(lid){
  const s=sessions.find(x=>x.localId===lid);if(!s)return;
  s.status='connecting';s.qrImage=null;s.code=null;s.error=null;renderSessions();
  try{
    const res=await api('link',{phone:s.phone,method:s.method});
    s.id=res.id;s.qrImage=res.qrImage;s.code=res.code;s.status=res.status;s.error=res.error;renderSessions();
    if(pollingIntervals[lid])clearInterval(pollingIntervals[lid]);
    pollingIntervals[lid]=setInterval(()=>pollSession(lid),2000);
  }catch(e){s.status='error';s.error=e.message;renderSessions()}
}
async function pollSession(lid){
  const s=sessions.find(x=>x.localId===lid);if(!s||!s.id)return;
  try{
    const res=await api('check',{id:s.id});
    if(res.error==='Not found'){s.status='error';s.error='Session lost';clearInterval(pollingIntervals[lid]);renderSessions();return}
    const ch=s.status!==res.status||s.code!==res.code||s.qrImage!==res.qrImage||s.error!==res.error||JSON.stringify(s.reports)!==JSON.stringify(res.reports)||s.banStatus!==res.banStatus||s.banMessageStatus!==res.banMessageStatus;
    s.status=res.status;s.code=res.code||s.code;s.qrImage=res.qrImage||s.qrImage;s.error=res.error;s.reports=res.reports;s.banStatus=res.banStatus;s.banMessageStatus=res.banMessageStatus;
    if(ch)renderSessions();
  }catch(e){}
}
function toggleMethod(lid,m){const s=sessions.find(x=>x.localId===lid);if(s){s.method=m;s.qrImage=null;s.code=null;s.status='new';s.error=null;renderSessions()}}
function toggleSelect(lid){const s=sessions.find(x=>x.localId===lid);if(s){s.selected=!s.selected;renderSessions();updateExecBtn()}}
function setBanType(t){
  banType=t;
  document.getElementById('btn-num').className=t==='number'?'px-4 py-2 rounded-lg text-xs font-medium transition bg-accent-600 text-white':'px-4 py-2 rounded-lg text-xs font-medium transition bg-dark-600 text-gray-400 hover:text-white';
  document.getElementById('btn-grp').className=t==='group'?'px-4 py-2 rounded-lg text-xs font-medium transition bg-accent-600 text-white':'px-4 py-2 rounded-lg text-xs font-medium transition bg-dark-600 text-gray-400 hover:text-white';
  document.getElementById('inp-num').classList.toggle('hidden',t!=='number');
  document.getElementById('inp-grp').classList.toggle('hidden',t!=='group');
}
function changeCount(d){reportCount=Math.max(1,Math.min(50,reportCount+d));document.getElementById('report-count').textContent=reportCount}
async function resolveGroup(){
  const link=document.getElementById('target-group').value.trim();if(!link)return;
  const linked=sessions.filter(s=>s.status==='linked');
  if(!linked.length){document.getElementById('group-info').innerHTML='<span class="text-red-400">Link a session first</span>';return}
  document.getElementById('group-info').innerHTML='<span class="text-gray-500">Resolving...</span>';
  try{const res=await api('group',{id:linked[0].id,link});groupJid=res.id;document.getElementById('group-info').innerHTML='<span class="text-green-400">"'+res.name+'" - '+res.members+' members</span>'}
  catch(e){groupJid=null;document.getElementById('group-info').innerHTML='<span class="text-red-400">'+(e.error||'Failed')+'</span>'}
}
function updateExecBtn(){
  const linked=sessions.filter(s=>s.status==='linked'&&s.selected);
  document.getElementById('btn-exec').disabled=linked.length===0;
  const checks=document.getElementById('session-checks');
  if(!linked.length&&sessions.length)checks.innerHTML='<span class="text-xs text-gray-600">No linked sessions selected</span>';
}
function renderSessions(){
  const grid=document.getElementById('session-grid');
  if(!sessions.length){grid.innerHTML='';grid.appendChild(createEmpty());renderChecks();updateExecBtn();return}
  grid.innerHTML=sessions.map(s=>{
    const sc=s.status==='linked'?'green':s.status==='error'?'red':'yellow';
    const st=s.status==='linked'?'Linked':s.status==='error'?'Error':s.status==='waiting'?'Waiting':s.status==='connecting'?'Connecting':'Ready';
    let bot='';
    if(s.status==='linked')bot='<div class="flex items-center gap-2"><input type="checkbox" '+(s.selected?'checked':'')+' onchange="toggleSelect(\''+s.localId+'\')" class="accent-accent-600"><span class="text-xs text-gray-400">Use for ban</span></div>';
    else if(s.status==='error')bot='<button onclick="linkSession(\''+s.localId+'\')" class="w-full py-2 bg-accent-600 hover:bg-accent-700 text-white text-xs font-medium rounded-lg transition">Retry</button>';
    else bot='<button onclick="linkSession(\''+s.localId+'\')" class="w-full py-2 bg-accent-600 hover:bg-accent-700 text-white text-xs font-medium rounded-lg transition">Link</button>';
    let qrH=s.method==='qr'&&s.qrImage?'<div class="flex justify-center mb-3 bg-dark-700 rounded-lg p-3"><img src="'+s.qrImage+'" style="width:180px;border-radius:8px;"></div>':s.method==='qr'&&(s.status==='connecting'||s.status==='waiting')?'<div class="flex justify-center mb-3 py-6 text-gray-500 text-xs">Connecting...</div>':'';
    let codeH=s.method==='code'&&s.code?'<div class="text-center mb-3 py-3 bg-dark-700 rounded-lg"><div class="text-2xl font-bold text-white tracking-widest">'+s.code+'</div><div class="text-xs text-gray-500 mt-1">Enter on phone</div></div>':'';
    let pTag=s.localId.startsWith('loaded_')?'<div class="text-xs text-green-500/50 mb-2">Persistent</div>':'';
    return'<div class="bg-dark-800 rounded-xl border border-dark-600 p-4"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-'+sc+'-500 '+(s.status==='waiting'||s.status==='connecting'?'pulse-dot':'')+'"></span><span class="text-xs text-gray-400">'+st+'</span></div><button onclick="removeSession(\''+s.localId+'\')" class="text-gray-600 hover:text-red-400 text-xs transition">X</button></div>'+pTag+(s.method==='code'?'<input type="text" placeholder="Phone number" value="'+s.phone+'" onchange="updatePhone(\''+s.localId+'\',this.value)" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 mb-3 focus:outline-none focus:border-accent-600">':'')+'<div class="flex gap-1.5 mb-3"><button onclick="toggleMethod(\''+s.localId+'\',\'qr\')" class="flex-1 py-1.5 rounded text-xs font-medium transition '+(s.method==='qr'?'bg-accent-600 text-white':'bg-dark-600 text-gray-500')+'">QR</button><button onclick="toggleMethod(\''+s.localId+'\',\'code\')" class="flex-1 py-1.5 rounded text-xs font-medium transition '+(s.method==='code'?'bg-accent-600 text-white':'bg-dark-600 text-gray-500')+'">Code</button></div>'+qrH+codeH+(s.error?'<div class="text-xs text-red-400 mb-3">'+s.error+'</div>':'')+bot+'</div>';
  }).join('');
  renderChecks();updateExecBtn();
}
function createEmpty(){const d=document.createElement('div');d.id='empty-sessions';d.className='col-span-full text-center py-12 text-gray-600 text-sm';d.textContent='No sessions. Click "+ Add Session" to start.';return d}
function renderChecks(){
  const el=document.getElementById('session-checks');
  const linked=sessions.filter(s=>s.status==='linked');
  if(!linked.length){el.innerHTML='<span class="text-xs text-gray-600">Link sessions first</span>';return}
  el.innerHTML=linked.map(s=>'<label class="flex items-center gap-1.5 px-2.5 py-1.5 bg-dark-700 rounded-lg cursor-pointer"><input type="checkbox" '+(s.selected?'checked':'')+' onchange="toggleSelect(\''+s.localId+'\')" class="accent-accent-600"><span class="text-xs text-gray-300">'+(s.phone||s.id)+'</span></label>').join('');
}
function updatePhone(lid,v){const s=sessions.find(x=>x.localId===lid);if(s)s.phone=v}

async function executeBan(){
  const linked=sessions.filter(s=>s.status==='linked'&&s.selected);
  if(!linked.length)return;
  let target;
  if(banType==='number'){let n=document.getElementById('target-number').value.replace(/\D/g,'');if(n.startsWith('0'))n=n.substring(1);target=n+'@s.whatsapp.net'}
  else{if(!groupJid){alert('Resolve group first');return}target=groupJid}
  const btn=document.getElementById('btn-exec');btn.disabled=true;btn.textContent='SENDING...';
  const rs=document.getElementById('results-section');const rl=document.getElementById('results-list');const si=document.getElementById('sending-indicator');const sm=document.getElementById('results-summary');
  rs.classList.remove('hidden');rl.innerHTML='';sm.classList.add('hidden');

  for(const s of linked){
    try{await api('ban',{id:s.id,target,type:banType,count:reportCount})}catch(e){}
    const lid=s.localId;
    const intv=setInterval(async()=>{
      const s=sessions.find(x=>x.localId===lid);if(!s){clearInterval(intv);return}
      const res=await api('check',{id:s.id});
      s.reports=res.reports;s.banStatus=res.banStatus;s.banMessageStatus=res.banMessageStatus;
      if(res.reports&&res.reports.length){
        si.classList.add('hidden');
        let html='';
        for(const r of res.reports){
          const ok=r.status==='sent';
          html+='<div class="report-row flex items-center gap-2 px-3 py-1.5 rounded-lg '+(ok?'bg-green-900/30 border border-green-800/50':'bg-red-900/30 border border-red-800/50')+'"><span class="text-xs text-gray-500 w-6">#'+(r.i+1)+'</span><span class="w-2 h-2 rounded-full '+(ok?'bg-green-500':'bg-red-500')+'"></span><span class="text-xs '+(ok?'text-green-400':'text-red-400')+'">'+(ok?'Sent':'Failed')+(r.error?' — '+r.error:'')+'</span></div>';
        }
        rl.innerHTML=html;
      }
      if(res.banStatus==='complete'){
        clearInterval(intv);
        const sent=res.reports.filter(r=>r.status==='sent').length;
        const failed=res.reports.filter(r=>r.status==='failed').length;
        sm.classList.remove('hidden');sm.classList.add('success-flash');
        sm.innerHTML='<div class="space-y-2"><div class="text-green-400 font-semibold text-sm">SUCCESSFUL</div><div class="flex justify-between"><span class="text-gray-400">Total</span><span class="text-white font-bold">'+(sent+failed)+'</span></div><div class="flex justify-between"><span class="text-gray-400">Sent</span><span class="text-green-400">'+sent+'</span></div><div class="flex justify-between"><span class="text-gray-400">Failed</span><span class="text-red-400">'+failed+'</span></div>'+(res.banMessageStatus==='sent'?'<div class="flex justify-between mt-2 pt-2 border-t border-dark-600"><span class="text-gray-400">Message to you</span><span class="text-green-400">Delivered</span></div>':res.banMessageStatus&&res.banMessageStatus.startsWith('failed')?'<div class="flex justify-between mt-2 pt-2 border-t border-dark-600"><span class="text-gray-400">Message to you</span><span class="text-red-400">Failed</span></div>':'')+'</div>';
        btn.disabled=false;btn.textContent='EXECUTE BAN';
      }
    },800);
  }
}
loadExistingSessions();
</script>
</body>
</html>
